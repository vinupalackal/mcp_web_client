<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sign In — RDK MCP Triaging Tool</title>
    <link rel="stylesheet" href="/static/style.css?v=17">
    <style>
        /* Login page — scoped styles */
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.18), transparent 32%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 28%),
                var(--bg-primary);
        }

        .login-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-lg);
            width: 100%;
            max-width: 420px;
            padding: 2.5rem 2rem 2rem;
            text-align: center;
        }

        .login-logo {
            font-size: 2.5rem;
            margin-bottom: 0.5rem;
            display: block;
        }

        .login-title {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--text-primary);
            margin: 0 0 0.25rem;
        }

        .login-subtitle {
            font-size: 0.875rem;
            color: var(--text-secondary);
            margin: 0 0 2rem;
        }

        .login-heading {
            font-size: 1rem;
            font-weight: 600;
            color: var(--text-primary);
            margin: 0 0 1.25rem;
        }

        .login-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.625rem;
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: var(--radius-md);
            border: 1px solid var(--border-color);
            background: var(--bg-tertiary);
            color: var(--text-primary);
            font-size: 0.9375rem;
            font-weight: 500;
            cursor: pointer;
            text-decoration: none;
            transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
            margin-bottom: 0.75rem;
        }

        .login-btn:hover {
            background: var(--bg-accent-soft);
            border-color: var(--accent-color);
            box-shadow: var(--ring-focus);
        }

        .login-btn-icon {
            width: 22px;
            height: 22px;
            flex-shrink: 0;
        }

        .login-footer {
            margin-top: 1.75rem;
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .login-banner {
            background: var(--bg-accent-soft);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            border-radius: var(--radius-sm);
            padding: 0.625rem 0.875rem;
            font-size: 0.8125rem;
            margin-bottom: 1.25rem;
        }

        .login-banner.error {
            background: #fff0f0;
            border-color: var(--danger-color);
            color: var(--danger-color);
        }

        [data-theme="dark"] .login-banner.error {
            background: rgba(220, 38, 38, 0.1);
        }

        [data-theme="dark"] body {
            background:
                radial-gradient(circle at top left, rgba(37, 99, 235, 0.2), transparent 32%),
                radial-gradient(circle at bottom right, rgba(14, 165, 233, 0.12), transparent 28%),
                #0f172a;
        }
    </style>
</head>
<body>
    <div class="login-card">
        <span class="login-logo">🔌</span>
        <h1 class="login-title">RDK MCP Triaging Tool</h1>
        <p class="login-subtitle">Sign in to continue</p>

        <div id="loginBanner" class="login-banner" style="display:none;"></div>

        <p class="login-heading">Choose your sign-in method</p>

        <div id="providerButtons">
            <!-- Injected by script below based on available providers -->
        </div>

        <p class="login-footer">By signing in you accept the Terms of Use.</p>
    </div>

    <script>
        // Apply saved theme preference immediately (avoids flash)
        (function () {
            const saved = localStorage.getItem('theme');
            if (saved === 'dark') document.documentElement.setAttribute('data-theme', 'dark');
        })();

        // Show session-expired / error banner
        const params = new URLSearchParams(window.location.search);
        const reason = params.get('reason');
        const banner = document.getElementById('loginBanner');
        if (reason === 'session_expired') {
            banner.textContent = 'Your session expired. Please sign in again.';
            banner.style.display = 'block';
        } else if (reason === 'auth_failed') {
            banner.textContent = 'Sign-in failed. Please try again.';
            banner.classList.add('error');
            banner.style.display = 'block';
        }

        // Build provider buttons from the backend-served list
        async function loadProviders() {
            const container = document.getElementById('providerButtons');

            const PROVIDER_META = {
                azure_ad: {
                    label: 'Sign in with Microsoft',
                    icon: `<svg class="login-btn-icon" viewBox="0 0 23 23" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <rect x="1" y="1" width="10" height="10" fill="#f25022"/>
                        <rect x="12" y="1" width="10" height="10" fill="#7fba00"/>
                        <rect x="1" y="12" width="10" height="10" fill="#00a4ef"/>
                        <rect x="12" y="12" width="10" height="10" fill="#ffb900"/>
                    </svg>`,
                },
                google: {
                    label: 'Sign in with Google',
                    icon: `<svg class="login-btn-icon" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg">
                        <path fill="#4285F4" d="M45.5 24.5c0-1.5-.1-3-.4-4.4H24v8.3h12.1c-.5 2.7-2.1 5-4.5 6.5v5.4h7.2c4.2-3.9 6.7-9.6 6.7-15.8z"/>
                        <path fill="#34A853" d="M24 46c6 0 11.1-2 14.8-5.4l-7.2-5.6c-2 1.3-4.5 2.1-7.6 2.1-5.8 0-10.8-3.9-12.5-9.2H4v5.8C7.7 41.5 15.4 46 24 46z"/>
                        <path fill="#FBBC05" d="M11.5 28c-.5-1.3-.7-2.6-.7-4s.3-2.7.7-4v-5.8H4A22 22 0 0 0 2 24c0 3.6.9 7 2 9.8l7.5-5.8z"/>
                        <path fill="#EA4335" d="M24 10.8c3.2 0 6.1 1.1 8.4 3.3l6.3-6.3C34.9 4.2 29.8 2 24 2 15.4 2 7.7 6.5 4 13.2l7.5 5.8C13.2 13.7 18.2 10.8 24 10.8z"/>
                    </svg>`,
                },
            };

            try {
                // Ask the backend which providers are configured
                const resp = await fetch('/auth/providers');
                if (!resp.ok) throw new Error('no /auth/providers endpoint');
                const { providers } = await resp.json();
                providers.forEach(key => renderButton(key));
            } catch {
                // Fallback: render both and let the click fail gracefully
                Object.keys(PROVIDER_META).forEach(key => renderButton(key));
            }

            function renderButton(key) {
                const meta = PROVIDER_META[key];
                if (!meta) return;
                const a = document.createElement('a');
                a.href = `/auth/login/${key}`;
                a.className = 'login-btn';
                a.innerHTML = `${meta.icon}<span>${meta.label}</span>`;
                container.appendChild(a);
            }
        }

        loadProviders();
    </script>
</body>
</html>
